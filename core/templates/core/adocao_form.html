{% extends 'core/base.html' %}
{% block content %}
<div class="card mx-auto" style="max-width: 600px;">
  <div class="card-body text-center">
    <h3>Solicitar adoção de {{ animal.nome }}</h3>
    <p>Você está prestes a enviar um pedido de adoção para este animal.</p>
    <form method="post" id="formAdocao">
      {% csrf_token %}
      <button type="submit" class="btn btn-green w-100" id="btnConfirmar">Confirmar adoção 🐾</button>
      <a href="{% url 'animal_detail' animal.id %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
    </form>
  </div>
</div>

<script>
  document.getElementById('formAdocao').addEventListener('submit', function() {
    const btn = document.getElementById('btnConfirmar');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Enviando...';
  });
</script>
{% endblock %}
